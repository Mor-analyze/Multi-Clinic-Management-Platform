name: Backend Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]



jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clinichub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt


        - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clinichub_test
        run: |
          cd backend
          alembic upgrade head

        - name: Create test admin user
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clinichub_test
        run: |
          cd backend
          python -c "
          from app.models.database import SessionLocal
          from app.models.user import User, UserRole
          from app.services.auth import hash_password
          db = SessionLocal()
          admin = User(full_name='Test Admin', email='morteza@clinichub.com', password_hash=hash_password('admin123'), role=UserRole.admin, branch_id=None, is_active=True)
          db.add(admin)
          db.commit()
          db.close()
          "
          
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clinichub_test
          JWT_SECRET: test-secret-key
          ACCESS_TOKEN_EXPIRE_MINUTES: 480
        run: |
          cd backend
          pytest tests/ -v
          
